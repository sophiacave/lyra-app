<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Quiz — Automation Architect</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e5e5e5;font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
a{color:inherit;text-decoration:none}
.nav{display:flex;justify-content:space-between;align-items:center;padding:1.25rem 2rem;border-bottom:1px solid rgba(255,255,255,.06);max-width:1000px;margin:0 auto}
.logo{font-weight:700;font-size:1.1rem;background:linear-gradient(135deg,#34C759,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.back-link{font-size:.85rem;color:#a1a1aa;transition:color .2s}.back-link:hover{color:#e5e5e5}
.lesson-header{text-align:center;padding:3rem 2rem 2rem;max-width:800px;margin:0 auto}
.lesson-badge{display:inline-flex;align-items:center;gap:.5rem;padding:.3rem .75rem;border-radius:100px;background:rgba(251,146,60,.1);border:1px solid rgba(251,146,60,.2);font-size:.7rem;font-weight:600;color:#fb923c;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1rem}
.lesson-header h1{font-size:2.25rem;font-weight:800;margin-bottom:.5rem}
.lesson-header p{color:#a1a1aa;font-size:1rem;max-width:500px;margin:0 auto}
.content{max-width:800px;margin:0 auto;padding:2rem}

.quiz-progress{display:flex;gap:6px;margin-bottom:2rem}
.quiz-pip{flex:1;height:4px;border-radius:4px;background:rgba(255,255,255,.06);transition:background .3s}
.quiz-pip.correct{background:#34C759}.quiz-pip.wrong{background:#ef4444}.quiz-pip.current{background:rgba(251,146,60,.4)}

.question-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:2rem;margin-bottom:1.5rem}
.q-number{font-size:.75rem;color:#fb923c;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem}
.q-text{font-size:1.1rem;font-weight:600;line-height:1.5;margin-bottom:1.5rem}
.answers{display:flex;flex-direction:column;gap:.5rem}
.answer-btn{display:block;width:100%;text-align:left;padding:1rem 1.25rem;border:2px solid rgba(255,255,255,.06);border-radius:12px;background:rgba(255,255,255,.02);color:#e5e5e5;font-family:'Inter',sans-serif;font-size:.9rem;cursor:pointer;transition:all .25s}
.answer-btn:hover{border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.05)}
.answer-btn.correct{border-color:#34C759;background:rgba(52,199,89,.1);color:#34C759}
.answer-btn.wrong{border-color:#ef4444;background:rgba(239,68,68,.1);color:#ef4444}
.answer-btn.disabled{pointer-events:none;opacity:.5}.answer-btn.correct.disabled{opacity:1}
.explanation{margin-top:1rem;padding:1rem;border-radius:10px;background:rgba(52,199,89,.05);border:1px solid rgba(52,199,89,.15);font-size:.85rem;color:#a1a1aa;line-height:1.5;display:none}
.explanation.visible{display:block}
.explanation strong{color:#34C759}
.next-btn{display:none;margin:1.5rem auto 0;padding:.75rem 2rem;border:none;border-radius:10px;background:rgba(56,189,248,.15);color:#38bdf8;font-family:'Inter',sans-serif;font-weight:700;cursor:pointer;font-size:.9rem;transition:all .2s}
.next-btn:hover{background:rgba(56,189,248,.25)}.next-btn.visible{display:block}
.results{text-align:center;padding:3rem 2rem;display:none}.results.visible{display:block}
.results-score{font-size:3rem;font-weight:800;margin-bottom:.5rem}
.results-score.great{color:#34C759}.results-score.ok{color:#fb923c}.results-score.low{color:#ef4444}
.results-msg{font-size:1.1rem;color:#a1a1aa;margin-bottom:1.5rem}
.retry-btn{padding:.75rem 2rem;border:none;border-radius:10px;background:rgba(251,146,60,.15);color:#fb923c;font-family:'Inter',sans-serif;font-weight:700;cursor:pointer;font-size:.9rem}
.complete-btn{display:block;width:100%;max-width:400px;margin:2rem auto 1rem;padding:1rem;border:none;border-radius:12px;background:linear-gradient(135deg,#34C759,#2da44e);color:#0a0a0f;font-family:'Inter',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .3s}
.complete-btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(52,199,89,.3)}
.complete-btn.done{background:rgba(52,199,89,.15);color:#34C759;cursor:default}
.progress-footer{text-align:center;padding:2rem;border-top:1px solid rgba(255,255,255,.06);max-width:800px;margin:0 auto}
.progress-footer p{font-size:.8rem;color:#52525b}
@media(max-width:600px){.lesson-header h1{font-size:1.75rem}}
</style>
</head>
<body>
<nav class="nav">
  <a href="/academy" class="logo">LIKE ONE</a>
  <a href="index.html" class="back-link">&larr; Automation Architect</a>
</nav>
<header class="lesson-header">
  <div class="lesson-badge">Module 2 &middot; Quiz</div>
  <h1>API Quiz</h1>
  <p>Test your knowledge of HTTP methods, status codes, headers, and authentication.</p>
</header>
<div class="content">
  <div class="quiz-progress" id="quizProgress"></div>
  <div id="questionContainer"></div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question &rarr;</button>
  <div class="results" id="results">
    <div class="results-score" id="resultsScore"></div>
    <div class="results-msg" id="resultsMsg"></div>
    <button class="retry-btn" onclick="resetQuiz()">Try Again</button>
  </div>
  <button class="complete-btn" id="completeBtn" style="display:none" onclick="completeLesson()">Complete Lesson &mdash; Earn 40 XP</button>
</div>
<footer class="progress-footer"><p>Lesson 6 of 9 &middot; Automation Architect</p></footer>

<script>
const SLUG='api-quiz';
const STORAGE_KEY='automation-architect-progress';

const questions=[
  {q:"Which HTTP method is used to retrieve data without modifying it?",answers:["POST","GET","PUT","DELETE"],correct:1,explanation:"<strong>GET</strong> is the read-only method. It retrieves data from the server without changing anything."},
  {q:"What does a 201 status code mean?",answers:["OK — request succeeded","Resource was created successfully","Resource not found","Server error"],correct:1,explanation:"<strong>201 Created</strong> means the server successfully created a new resource, typically returned after a POST request."},
  {q:"Where is an API key typically sent in a request?",answers:["In the URL path","In the response body","In the Authorization header","In the status code"],correct:2,explanation:"API keys are sent in the <strong>Authorization header</strong> (e.g., Authorization: Bearer sk_abc123). This keeps credentials separate from the URL and body."},
  {q:"What does a 404 status code indicate?",answers:["Authentication required","Request was malformed","The requested resource was not found","Server crashed"],correct:2,explanation:"<strong>404 Not Found</strong> means the server understood your request but the resource at that URL doesn't exist."},
  {q:"Which content type header indicates you're sending JSON data?",answers:["text/html","application/json","multipart/form-data","text/plain"],correct:1,explanation:"<strong>application/json</strong> tells the server that your request body contains JSON-formatted data."},
  {q:"What is the difference between PUT and POST?",answers:["PUT creates, POST updates","PUT updates/replaces, POST creates","They are identical","PUT deletes, POST reads"],correct:1,explanation:"<strong>PUT</strong> updates or replaces an existing resource. <strong>POST</strong> creates a new resource. PUT is idempotent (same result each time)."},
];

let currentQ=0,score=0,answered=false;

function renderProgress(){
  document.getElementById('quizProgress').innerHTML=questions.map((_,i)=>`<div class="quiz-pip${i===currentQ?' current':''}" id="pip${i}"></div>`).join('');
}

function renderQuestion(){
  answered=false;renderProgress();
  const q=questions[currentQ];
  document.getElementById('questionContainer').innerHTML=`
    <div class="question-card">
      <div class="q-number">Question ${currentQ+1} of ${questions.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="answers">${q.answers.map((a,i)=>`<button class="answer-btn" onclick="selectAnswer(${i})">${a}</button>`).join('')}</div>
      <div class="explanation" id="explanation">${q.explanation}</div>
    </div>`;
  document.getElementById('nextBtn').classList.remove('visible');
}

function selectAnswer(idx){
  if(answered)return;answered=true;
  const q=questions[currentQ];
  const btns=document.querySelectorAll('.answer-btn');
  btns.forEach((b,i)=>{
    if(i===q.correct)b.classList.add('correct');
    if(i===idx&&i!==q.correct)b.classList.add('wrong');
    if(i!==q.correct&&i!==idx)b.classList.add('disabled');
  });
  if(idx===q.correct){score++;document.getElementById('pip'+currentQ).classList.add('correct');}
  else{document.getElementById('pip'+currentQ).classList.add('wrong');}
  document.getElementById('explanation').classList.add('visible');
  if(currentQ<questions.length-1)document.getElementById('nextBtn').classList.add('visible');
  else setTimeout(showResults,1200);
}

function nextQuestion(){currentQ++;renderQuestion();}

function showResults(){
  document.getElementById('questionContainer').innerHTML='';
  document.getElementById('nextBtn').classList.remove('visible');
  const pct=Math.round((score/questions.length)*100);
  document.getElementById('results').classList.add('visible');
  const s=document.getElementById('resultsScore');
  s.textContent=score+'/'+questions.length;
  s.className='results-score '+(pct>=80?'great':pct>=50?'ok':'low');
  document.getElementById('resultsMsg').textContent=pct>=80?'You know your APIs!':pct>=50?'Good start. Review HTTP methods and status codes.':'Keep studying. Re-read the API lesson.';
  if(pct>=50)document.getElementById('completeBtn').style.display='block';
}

function resetQuiz(){currentQ=0;score=0;document.getElementById('results').classList.remove('visible');document.getElementById('completeBtn').style.display='none';renderQuestion();}

function completeLesson(){
  const progress=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
  progress[SLUG]=true;localStorage.setItem(STORAGE_KEY,JSON.stringify(progress));
  const btn=document.getElementById('completeBtn');btn.textContent='Completed! +40 XP';btn.classList.add('done');
}

(function(){
  const progress=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
  if(progress[SLUG]){document.getElementById('completeBtn').style.display='block';document.getElementById('completeBtn').textContent='Completed! +40 XP';document.getElementById('completeBtn').classList.add('done');}
  renderQuestion();
})();
</script>
</body>
</html>
