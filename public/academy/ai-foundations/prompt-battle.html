<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Battle — AI Foundations</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e5e5e5;font-family:'Inter',sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}
.nav{display:flex;justify-content:space-between;align-items:center;padding:1.25rem 2rem;border-bottom:1px solid rgba(255,255,255,.06);max-width:1000px;margin:0 auto}
.logo{font-weight:700;font-size:1.1rem;background:linear-gradient(135deg,#c084fc,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-link{font-size:.85rem;color:#a1a1aa;transition:color .2s}.nav-link:hover{color:#e5e5e5}
.container{max-width:800px;margin:0 auto;padding:2rem}
.lesson-header{margin-bottom:2rem}
.lesson-header .meta{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem;flex-wrap:wrap}
.type-badge{padding:.25rem .75rem;border-radius:100px;font-weight:600;font-size:.7rem;text-transform:uppercase;letter-spacing:.04em;background:rgba(56,189,248,.12);color:#38bdf8}
.xp-badge{font-size:.8rem;font-weight:700;color:#fb923c}.time-badge{font-size:.8rem;color:#71717a}
.lesson-header h1{font-size:2rem;font-weight:800;line-height:1.2;margin-bottom:.5rem}
.lesson-header p{color:#a1a1aa;line-height:1.6}

.battle-arena{text-align:center;margin-bottom:2rem;position:relative}
.arena-bg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;background:radial-gradient(circle,rgba(192,132,252,.08),transparent);pointer-events:none;border-radius:50%}
.score-display{position:relative;margin-bottom:1.5rem}
.score-big{font-size:4rem;font-weight:800;background:linear-gradient(135deg,#c084fc,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.score-label{font-size:.85rem;color:#71717a;font-weight:600}
.streak{display:inline-flex;align-items:center;gap:.5rem;padding:.4rem 1rem;border-radius:100px;font-size:.8rem;font-weight:700;margin-top:.5rem}
.streak.hot{background:rgba(251,146,60,.15);color:#fb923c;animation:glow 1s ease infinite alternate}
@keyframes glow{from{box-shadow:0 0 10px rgba(251,146,60,.2)}to{box-shadow:0 0 25px rgba(251,146,60,.4)}}
.streak.cold{background:rgba(255,255,255,.05);color:#71717a}

.battle-progress{display:flex;gap:.5rem;justify-content:center;margin-bottom:2rem}
.bp-dot{width:40px;height:6px;border-radius:3px;background:rgba(255,255,255,.08);transition:background .3s}
.bp-dot.correct{background:#22c55e}
.bp-dot.wrong{background:#ef4444}
.bp-dot.current{background:#c084fc;animation:pulseDot 1s ease infinite}
@keyframes pulseDot{0%,100%{opacity:1}50%{opacity:.5}}

.battle-card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:2rem;margin-bottom:2rem;position:relative;overflow:hidden}
.battle-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#c084fc,#fb923c,#38bdf8)}
.round-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#fb923c;margin-bottom:1rem}
.q-text{font-size:1.15rem;font-weight:600;line-height:1.5;margin-bottom:1.5rem}
.battle-options{display:flex;flex-direction:column;gap:.5rem}
.b-option{padding:1rem 1.25rem;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02);cursor:pointer;transition:all .25s;font-size:.9rem;display:flex;align-items:center;gap:.75rem;position:relative;overflow:hidden}
.b-option:hover:not(.disabled){background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.15);transform:translateX(4px)}
.b-option .letter{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0;transition:all .3s}
.b-option.correct-answer{border-color:#22c55e;background:rgba(34,197,94,.08)}
.b-option.correct-answer .letter{background:#22c55e;color:#fff}
.b-option.wrong-answer{border-color:#ef4444;background:rgba(239,68,68,.08)}
.b-option.wrong-answer .letter{background:#ef4444;color:#fff}
.b-option.disabled{cursor:default}
.b-option .streak-effect{position:absolute;right:1rem;font-size:1.5rem;opacity:0;transform:translateY(10px);transition:all .4s}
.b-option.correct-answer .streak-effect{opacity:1;transform:translateY(0)}

.battle-feedback{margin-top:1.25rem;padding:1.25rem;border-radius:10px;font-size:.85rem;line-height:1.6;display:none}
.battle-feedback.show{display:block;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.battle-feedback.correct{background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.15);color:#4ade80}
.battle-feedback.incorrect{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);color:#f87171}

.results{text-align:center;padding:3rem 2rem;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:16px;margin-bottom:2rem;display:none}
.results.show{display:block;animation:fadeIn .5s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.results h2{font-size:1.75rem;font-weight:800;margin-bottom:1rem}
.results .trophy{font-size:4rem;margin-bottom:.5rem}
.results p{color:#a1a1aa;font-size:.95rem}

.complete-btn{display:block;width:100%;padding:1rem;border:none;border-radius:12px;background:linear-gradient(135deg,#c084fc,#a855f7);color:#fff;font-family:'Inter',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .3s;margin-bottom:2rem}
.complete-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(192,132,252,.3)}
.complete-btn.done{background:linear-gradient(135deg,#22c55e,#16a34a)}
.footer-progress{text-align:center;padding:1.5rem;border-top:1px solid rgba(255,255,255,.06);font-size:.85rem;color:#71717a}
.footer-progress span{color:#c084fc;font-weight:600}
</style>
</head>
<body>
<nav class="nav">
  <a href="/academy" class="logo">LIKE ONE</a>
  <a href="index.html" class="nav-link">← Back to Course</a>
</nav>
<div class="container">
  <div class="lesson-header">
    <div class="meta">
      <span class="type-badge">Quiz</span>
      <span class="xp-badge">+40 XP</span>
      <span class="time-badge">~10 min</span>
    </div>
    <h1>Prompt Battle</h1>
    <p>Test your prompt engineering skills in a fast-paced battle format. Score points for speed and accuracy.</p>
  </div>

  <div class="battle-arena">
    <div class="arena-bg"></div>
    <div class="score-display">
      <div class="score-big" id="scoreBig">0</div>
      <div class="score-label">BATTLE POINTS</div>
      <div class="streak cold" id="streakBadge">No streak yet</div>
    </div>
  </div>

  <div class="battle-progress" id="battleProgress"></div>
  <div id="battleContainer"></div>
  <div class="results" id="results"></div>

  <button class="complete-btn" id="completeBtn" onclick="completeLesson()">Complete & Continue →</button>
</div>
<div class="footer-progress"><span id="footerProgress">0 of 9</span> lessons complete</div>

<script>
const questions=[
  {
    q:"Which prompt technique is BEST for getting accurate math solutions?",
    opts:["Zero-shot: just ask the question","Few-shot: show 3 similar solved problems","Chain-of-thought: ask for step-by-step reasoning","Role-play: pretend to be a calculator"],
    correct:2,
    explain:"Chain-of-thought prompting forces the model to show its reasoning, which dramatically reduces errors on multi-step problems. Research shows up to 2x accuracy improvement."
  },
  {
    q:"What does lowering the temperature parameter do?",
    opts:["Makes the AI respond faster","Makes outputs more deterministic and focused","Reduces the context window size","Makes the AI more creative"],
    correct:1,
    explain:"Temperature controls randomness. Lower temperature (closer to 0) makes the model always pick the highest-probability token, giving consistent, focused outputs. Great for code and factual tasks."
  },
  {
    q:"A system prompt is powerful because it:",
    opts:["Gets processed before any user messages, shaping all responses","Uses fewer tokens than regular prompts","Bypasses the model's safety guidelines","Runs on a separate, faster processor"],
    correct:0,
    explain:"System prompts set the behavioral framework before any user interaction. They're processed first and influence every subsequent response — like giving the AI its job description before it starts work."
  }
];

let score=0,streak=0,current=0,answered=[];

function renderProgress(){
  const el=document.getElementById('battleProgress');
  el.innerHTML=questions.map((_,i)=>{
    let cls='bp-dot';
    if(i<current)cls+=' '+(answered[i]?'correct':'wrong');
    else if(i===current)cls+=' current';
    return`<div class="${cls}"></div>`;
  }).join('');
}

function renderQuestion(){
  if(current>=questions.length){showResults();return}
  const q=questions[current];
  const container=document.getElementById('battleContainer');
  container.innerHTML=`
    <div class="battle-card">
      <div class="round-label">Round ${current+1} of ${questions.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="battle-options" id="opts">
        ${q.opts.map((o,j)=>`<div class="b-option" onclick="answer(${j})">
          <div class="letter">${String.fromCharCode(65+j)}</div><span>${o}</span>
          <span class="streak-effect">${streak>=2?'🔥':''}</span>
        </div>`).join('')}
      </div>
      <div class="battle-feedback" id="feedback"></div>
    </div>`;
  renderProgress();
}

function answer(oi){
  const q=questions[current];
  const opts=document.querySelectorAll('#opts .b-option');
  if(opts[0].classList.contains('disabled'))return;
  opts.forEach(o=>o.classList.add('disabled'));

  const fb=document.getElementById('feedback');
  if(oi===q.correct){
    opts[oi].classList.add('correct-answer');
    streak++;
    const pts=10*(streak>=3?2:1);
    score+=pts;
    answered.push(true);
    fb.className='battle-feedback correct show';
    fb.textContent='✓ Correct! +'+pts+' points. '+q.explain;
  }else{
    opts[oi].classList.add('wrong-answer');
    opts[q.correct].classList.add('correct-answer');
    streak=0;
    answered.push(false);
    fb.className='battle-feedback incorrect show';
    fb.textContent='✗ Wrong! '+q.explain;
  }

  document.getElementById('scoreBig').textContent=score;
  const sb=document.getElementById('streakBadge');
  if(streak>=3){sb.className='streak hot';sb.textContent='🔥 '+streak+' streak — 2x points!'}
  else if(streak>=1){sb.className='streak hot';sb.textContent='⚡ '+streak+' in a row'}
  else{sb.className='streak cold';sb.textContent='Streak broken'}

  renderProgress();
  setTimeout(()=>{current++;renderQuestion()},2000);
}

function showResults(){
  document.getElementById('battleContainer').innerHTML='';
  const correct=answered.filter(a=>a).length;
  const res=document.getElementById('results');
  res.classList.add('show');
  let trophy,msg;
  if(correct===questions.length){trophy='🏆';msg='FLAWLESS VICTORY! You\'re a prompt engineering master.'}
  else if(correct>=2){trophy='🥈';msg='Great battle! You\'ve got strong prompt skills.'}
  else{trophy='💪';msg='Good effort! Review the explanations and try the playground again.'}
  res.innerHTML=`<div class="trophy">${trophy}</div><h2>${score} Points</h2><p>${correct}/${questions.length} correct — ${msg}</p>`;
}

renderQuestion();

function getProgress(){try{return JSON.parse(localStorage.getItem('ai-foundations-progress'))||{}}catch(e){return{}}}
function updateFooter(){
  const p=getProgress();const c=Object.keys(p).filter(k=>p[k]).length;
  document.getElementById('footerProgress').textContent=c+' of 9';
  if(p['prompt-battle']){document.getElementById('completeBtn').textContent='Completed ✓';document.getElementById('completeBtn').classList.add('done')}
}
function completeLesson(){
  const p=getProgress();p['prompt-battle']=true;localStorage.setItem('ai-foundations-progress',JSON.stringify(p));
  window.location.href='words-as-numbers.html';
}
updateFooter();
</script>
<script src="/academy/shared/auth.js"></script>
<script src="/academy/shared/engine.js"></script>
</body>
</html>
