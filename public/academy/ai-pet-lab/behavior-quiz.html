<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foundations Assessment — AI Pet Lab</title>
<link rel="icon" href="/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a25;--text:#e5e5e5;--dim:#8888a0;--muted:#55556a;--orange:#FF6B35;--blue:#38bdf8;--green:#4ade80;--red:#f87171;--border:#1e1e28;--border2:#2a2a38}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(255,107,53,.05) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(56,189,248,.04) 0%,transparent 50%);pointer-events:none;z-index:-1}
.wrap{max-width:800px;margin:0 auto;padding:0 1.5rem}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}

.top-bar{padding:1rem 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.top-bar a{color:var(--dim);font-size:.875rem;font-weight:500}
.top-bar a:hover{color:var(--text);text-decoration:none}
.lesson-badge{font-size:.7rem;font-weight:700;color:var(--orange);letter-spacing:1px;text-transform:uppercase}

.header{padding:2.5rem 0 1.5rem;text-align:center}
.header h1{font-size:2rem;font-weight:800;letter-spacing:-.5px;margin-bottom:.5rem}
.header p{color:var(--dim);font-size:1rem;max-width:600px;margin:0 auto}

/* PROGRESS DOTS */
.quiz-progress{display:flex;gap:.5rem;margin:2rem 0 1.5rem;justify-content:center}
.qp-dot{width:40px;height:4px;border-radius:2px;background:var(--border2);transition:all .4s}
.qp-dot.active{background:var(--orange)}
.qp-dot.correct{background:var(--green)}
.qp-dot.wrong{background:var(--red)}

/* QUESTION CARD */
.question-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;margin:1.5rem 0}
.q-num{font-size:.75rem;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:.75rem}
.q-text{font-size:1.05rem;font-weight:600;margin-bottom:1.5rem;line-height:1.6}
.options{display:flex;flex-direction:column;gap:.65rem}
.opt{background:var(--surface2);border:2px solid var(--border);border-radius:12px;padding:.9rem 1.25rem;cursor:pointer;transition:all .2s;font-size:.92rem;color:var(--dim);line-height:1.5}
.opt:hover{border-color:var(--border2);color:var(--text);background:rgba(255,255,255,.02)}
.opt.selected{border-color:var(--blue);color:var(--text);background:rgba(56,189,248,.05)}
.opt.correct{border-color:var(--green);color:var(--green);background:rgba(74,222,128,.06)}
.opt.wrong{border-color:var(--red);color:var(--red);background:rgba(248,113,113,.06)}
.opt.disabled{pointer-events:none}

.feedback{margin-top:1.25rem;padding:1rem 1.25rem;border-radius:12px;font-size:.88rem;display:none;line-height:1.6}
.feedback.show{display:block}
.feedback.correct-fb{background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.15);color:var(--dim)}
.feedback.correct-fb strong{color:var(--green)}
.feedback.wrong-fb{background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.15);color:var(--dim)}
.feedback.wrong-fb strong{color:var(--red)}

.btn-next{display:none;margin:1.5rem auto 0;background:var(--surface2);color:var(--text);font-weight:600;font-size:.9rem;padding:.7rem 1.8rem;border-radius:12px;border:1px solid var(--border);cursor:pointer;transition:all .2s}
.btn-next:hover{border-color:var(--orange);color:var(--orange);transform:translateY(-1px)}

/* RESULTS */
.results{display:none;text-align:center;padding:3rem 0}
.results h2{font-size:1.5rem;font-weight:800;margin-bottom:.5rem}
.results .score-display{margin:1.5rem 0}
.score-ring{width:120px;height:120px;margin:0 auto;position:relative}
.score-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.score-ring circle{fill:none;stroke-width:6}
.score-ring .bg{stroke:var(--border2)}
.score-ring .fill{stroke:var(--green);stroke-linecap:round;transition:stroke-dashoffset 1s ease,stroke 0.5s}
.score-ring .fill.ok{stroke:var(--orange)}
.score-ring .fill.bad{stroke:var(--red)}
.score-number{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.6rem;font-weight:800}
.results .msg{color:var(--dim);font-size:.95rem;margin:1.5rem 0 2rem;max-width:500px;margin-left:auto;margin-right:auto}
.btn-complete{display:inline-block;background:var(--orange);color:#000;font-weight:700;font-size:1rem;padding:.85rem 2.25rem;border-radius:12px;border:none;cursor:pointer;transition:all .2s}
.btn-complete:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,107,53,.3)}

.foot{display:flex;justify-content:space-between;align-items:center;padding:1.5rem 0;border-top:1px solid var(--border);margin-top:2rem;font-size:.85rem;color:var(--muted)}
.foot a{color:var(--orange);font-weight:600;text-decoration:none}
.foot a:hover{text-decoration:underline}

@media(max-width:600px){.header h1{font-size:1.5rem}.question-card{padding:1.5rem}}
</style>
</head>
<body>
<div class="wrap">

<div class="top-bar">
  <a href="index.html">&larr; AI Pet Lab</a>
  <span class="lesson-badge">Lesson 3 of 9</span>
</div>

<div class="header">
  <h1>Foundations Assessment</h1>
  <p>Six questions on reinforcement learning fundamentals. Each answer includes an explanation to deepen your understanding.</p>
</div>

<div class="quiz-progress" id="qProgress"></div>

<div id="quizArea"></div>

<div class="results" id="results">
  <h2 id="resultsTitle"></h2>
  <div class="score-display">
    <div class="score-ring">
      <svg viewBox="0 0 120 120">
        <circle class="bg" cx="60" cy="60" r="52"/>
        <circle class="fill" id="scoreArc" cx="60" cy="60" r="52" stroke-dasharray="326.73" stroke-dashoffset="326.73"/>
      </svg>
      <div class="score-number" id="scoreNumber">0/6</div>
    </div>
  </div>
  <p class="msg" id="resultsMsg"></p>
  <button class="btn-complete" onclick="completeLesson()">Continue to Module 2</button>
</div>

<div class="foot">
  <a href="first-reward.html">&larr; The Reward Signal</a>
  <a href="teach-sit.html">Next: Shaping a Policy &rarr;</a>
</div>

</div>

<script>
const questions=[
  {
    q:"What does the reward signal represent in a reinforcement learning system?",
    opts:[
      "The optimal action the agent should take",
      "A scalar feedback value indicating how desirable the last transition was",
      "The probability of reaching the goal state",
      "The gradient used to update neural network weights"
    ],
    answer:1,
    explain:"The reward signal is a scalar number the environment provides after each action, encoding how good or bad the resulting state transition was. It is the agent's only source of evaluative feedback \u2014 unlike supervised learning, there is no explicit \u201ccorrect answer\u201d label."
  },
  {
    q:"What is the exploration-exploitation tradeoff?",
    opts:[
      "Choosing between learning faster or more accurately",
      "Balancing trying new actions (exploration) versus repeating actions known to yield high reward (exploitation)",
      "Deciding whether to use a model of the environment or learn directly from experience",
      "Trading off between memory usage and computation speed"
    ],
    answer:1,
    explain:"An agent must balance exploiting its current best-known strategy (to maximize short-term reward) with exploring unfamiliar actions that might reveal better long-term strategies. The epsilon parameter controls this balance: higher epsilon means more random exploration."
  },
  {
    q:"In Q-learning, how is the Q-value for a state-action pair updated?",
    opts:[
      "Q(s,a) is set to the average of all rewards ever received in state s",
      "Q(s,a) is updated toward the received reward plus the discounted maximum Q-value of the next state",
      "Q(s,a) is incremented by 1 for each visit to state s",
      "Q(s,a) is replaced by the reward received on the most recent visit"
    ],
    answer:1,
    explain:"The Q-learning update rule is Q(s,a) \u2190 Q(s,a) + \u03b1[r + \u03b3 max Q(s',a') - Q(s,a)]. It blends the current estimate with a target: the immediate reward r plus the discounted value of the best action from the next state. This bootstrapping approach is the core of temporal difference learning."
  },
  {
    q:"What role does the discount factor \u03b3 (gamma) play in reinforcement learning?",
    opts:[
      "It determines how many episodes the agent trains for",
      "It controls the tradeoff between immediate and future rewards",
      "It sets the maximum reward the agent can receive",
      "It defines the size of the state space"
    ],
    answer:1,
    explain:"The discount factor \u03b3, between 0 and 1, determines how much the agent values future rewards relative to immediate ones. With \u03b3 = 0, the agent is entirely myopic, caring only about the next reward. With \u03b3 near 1, it plans far ahead, weighting distant future rewards almost as heavily as immediate ones."
  },
  {
    q:"Why is credit assignment difficult in sequential decision problems?",
    opts:[
      "Because the agent cannot observe its own actions",
      "Because the reward for reaching a goal may arrive many steps after the critical decisions that led there",
      "Because multiple agents compete for the same reward",
      "Because the environment changes randomly between episodes"
    ],
    answer:1,
    explain:"When an agent receives a reward after a long sequence of actions, it must determine which earlier actions actually contributed to the outcome. A reward at step 50 might depend on a decision made at step 3. This temporal credit assignment problem is fundamental to RL and is addressed through mechanisms like TD learning and eligibility traces."
  },
  {
    q:"What is the key difference between model-free and model-based reinforcement learning?",
    opts:[
      "Model-free uses neural networks while model-based uses decision trees",
      "Model-free learns values or policies directly from experience, while model-based first learns a model of environment dynamics and plans using it",
      "Model-free is for discrete actions and model-based is for continuous actions",
      "Model-based requires labeled training data while model-free does not"
    ],
    answer:1,
    explain:"Model-free methods (like Q-learning) learn value functions or policies purely from sampled experience without ever building an explicit model of how the environment works. Model-based methods learn a transition model P(s'|s,a) and reward model R(s,a), then use planning algorithms to derive a policy. Model-based approaches are typically more sample-efficient but computationally heavier."
  }
];

let current=0,score=0,answered=new Array(questions.length).fill(null);

function renderProgress(){
  const el=document.getElementById('qProgress');
  el.innerHTML='';
  questions.forEach((_,i)=>{
    const dot=document.createElement('div');
    let cls='qp-dot';
    if(i===current && answered[i]===null) cls+=' active';
    if(answered[i]==='correct') cls+=' correct';
    if(answered[i]==='wrong') cls+=' wrong';
    dot.className=cls;
    el.appendChild(dot);
  });
}

function renderQuestion(){
  if(current>=questions.length){showResults();return;}
  const q=questions[current];
  const area=document.getElementById('quizArea');
  let html='<div class="question-card">';
  html+='<div class="q-num">Question '+(current+1)+' of '+questions.length+'</div>';
  html+='<div class="q-text">'+q.q+'</div>';
  html+='<div class="options">';
  q.opts.forEach((o,i)=>{
    html+='<div class="opt" data-idx="'+i+'" onclick="selectAnswer('+i+')">'+o+'</div>';
  });
  html+='</div>';
  html+='<div class="feedback" id="feedback"></div>';
  html+='<button class="btn-next" id="btnNext" onclick="nextQuestion()">'+(current<questions.length-1?'Next Question':'See Results')+'</button>';
  html+='</div>';
  area.innerHTML=html;
  renderProgress();
}

function selectAnswer(idx){
  const q=questions[current];
  const opts=document.querySelectorAll('.opt');
  const fb=document.getElementById('feedback');

  opts.forEach(o=>o.classList.add('disabled'));

  if(idx===q.answer){
    opts[idx].classList.add('correct');
    score++;
    answered[current]='correct';
    fb.className='feedback show correct-fb';
    fb.innerHTML='<strong>Correct.</strong> '+q.explain;
  }else{
    opts[idx].classList.add('wrong');
    opts[q.answer].classList.add('correct');
    answered[current]='wrong';
    fb.className='feedback show wrong-fb';
    fb.innerHTML='<strong>Incorrect.</strong> '+q.explain;
  }

  document.getElementById('btnNext').style.display='block';
  renderProgress();
}

function nextQuestion(){
  current++;
  renderQuestion();
}

function showResults(){
  document.getElementById('quizArea').style.display='none';
  document.getElementById('qProgress').style.display='none';
  const r=document.getElementById('results');
  r.style.display='block';

  const pct=Math.round((score/questions.length)*100);
  document.getElementById('scoreNumber').textContent=score+'/'+questions.length;

  // Animate ring
  const circumference=326.73;
  const offset=circumference*(1-score/questions.length);
  const arc=document.getElementById('scoreArc');
  setTimeout(()=>{arc.style.strokeDashoffset=offset;},100);
  if(pct<60) arc.classList.add('bad');
  else if(pct<80) arc.classList.add('ok');

  document.getElementById('resultsTitle').textContent=
    pct>=83?'Excellent Understanding':pct>=60?'Solid Foundation':'Review Recommended';
  document.getElementById('resultsMsg').textContent=
    pct>=83?'You have a strong grasp of reinforcement learning fundamentals. You\'re ready to move on to policy learning and more advanced concepts.':
    pct>=60?'You understand the core ideas. Consider reviewing the reward signal lesson to strengthen your intuition before continuing.':
    'Reinforcement learning has nuances that take time to absorb. Revisit the first two lessons and pay special attention to the Q-table visualization before retaking this assessment.';
}

function completeLesson(){
  localStorage.setItem('petlab_lesson_3','complete');
  window.location.href='teach-sit.html';
}

renderQuestion();
</script>
<script src="/academy/shared/engine.js"></script>
<script src="/academy/shared/nav.js"></script>
<script src="/academy/shared/auth.js"></script>
</body>
</html>
