<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evolution Quiz — AI Pet Lab</title>
<link rel="icon" href="/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a25;--text:#e5e5e5;--dim:#8888a0;--muted:#55556a;--orange:#FF6B35;--blue:#38bdf8;--green:#4ade80;--red:#f87171;--purple:#c084fc;--border:#1e1e28;--border2:#2a2a38}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(255,107,53,.05) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(56,189,248,.04) 0%,transparent 50%);pointer-events:none;z-index:-1}
.wrap{max-width:800px;margin:0 auto;padding:0 1.5rem}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}
.top-bar{padding:1rem 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.top-bar a{color:var(--dim);font-size:.875rem;font-weight:500}
.top-bar a:hover{color:var(--text);text-decoration:none}
.lesson-badge{font-size:.7rem;font-weight:700;color:var(--orange);letter-spacing:1px;text-transform:uppercase}
.header{padding:2.5rem 0 1.5rem;text-align:center}
.header h1{font-size:2rem;font-weight:800;letter-spacing:-.5px;margin-bottom:.5rem}
.header p{color:var(--dim);font-size:1rem;max-width:600px;margin:0 auto}

.quiz-progress{display:flex;gap:.5rem;margin:2rem 0 1.5rem;justify-content:center}
.qp-dot{width:32px;height:4px;border-radius:2px;background:var(--border2);transition:background .3s}
.qp-dot.active{background:var(--orange)}
.qp-dot.correct{background:var(--green)}
.qp-dot.wrong{background:var(--red)}

.question-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;margin:1.5rem 0}
.q-num{font-size:.75rem;color:var(--orange);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:.75rem}
.q-text{font-size:1.1rem;font-weight:600;margin-bottom:1.5rem}
.options{display:flex;flex-direction:column;gap:.75rem}
.opt{background:var(--surface2);border:2px solid var(--border);border-radius:12px;padding:1rem 1.25rem;cursor:pointer;transition:all .2s;font-size:.95rem;color:var(--dim)}
.opt:hover{border-color:var(--border2);color:var(--text)}
.opt.correct{border-color:var(--green);color:var(--green);background:rgba(74,222,128,.08)}
.opt.wrong{border-color:var(--red);color:var(--red);background:rgba(248,113,113,.08)}
.opt.disabled{pointer-events:none}

.feedback{margin-top:1rem;padding:1rem;border-radius:10px;font-size:.9rem;display:none}
.feedback.show{display:block}
.feedback.correct{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);color:var(--green)}
.feedback.wrong{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:var(--red)}

.btn-next{display:none;margin:1.5rem auto 0;background:var(--orange);color:#000;font-weight:700;font-size:.95rem;padding:.75rem 2rem;border-radius:12px;border:none;cursor:pointer;transition:all .2s}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(255,107,53,.25)}

/* FINAL RESULTS */
.results{display:none;text-align:center;padding:3rem 0}
.results h2{font-size:1.75rem;font-weight:800;margin-bottom:.5rem}
.results .score{font-size:3rem;font-weight:800;margin:1rem 0}
.results .score.good{color:var(--green)}
.results .score.ok{color:var(--orange)}
.results .score.bad{color:var(--red)}
.results p{color:var(--dim);font-size:1rem;margin-bottom:1rem}

/* CERTIFICATE */
.certificate{background:var(--surface);border:2px solid var(--orange);border-radius:20px;padding:2.5rem;margin:2rem auto;max-width:500px;text-align:center;position:relative;overflow:hidden}
.certificate::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at center,rgba(255,107,53,.06) 0%,transparent 60%);pointer-events:none}
.cert-badge{font-size:3rem;margin-bottom:.5rem}
.cert-title{font-size:1.3rem;font-weight:800;color:var(--orange);margin-bottom:.25rem}
.cert-name{font-size:1rem;color:var(--text);margin-bottom:.5rem}
.cert-pet{font-size:.9rem;color:var(--dim)}
.cert-xp{display:inline-block;margin-top:1rem;background:rgba(255,107,53,.12);color:var(--orange);font-weight:800;font-size:1.1rem;padding:.5rem 1.5rem;border-radius:10px;border:1px solid rgba(255,107,53,.25)}

.btn-complete{display:inline-block;background:var(--orange);color:#000;font-weight:700;font-size:1rem;padding:.85rem 2.25rem;border-radius:12px;border:none;cursor:pointer;transition:all .2s;margin-top:1.5rem}
.btn-complete:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,107,53,.3)}

.confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1000}

.foot{display:flex;justify-content:space-between;align-items:center;padding:1.5rem 0;border-top:1px solid var(--border);margin-top:2rem;font-size:.85rem;color:var(--muted)}
.foot a{color:var(--orange);font-weight:600;text-decoration:none}
.foot a:hover{text-decoration:underline}

@media(max-width:600px){.header h1{font-size:1.5rem}.question-card{padding:1.5rem}.certificate{padding:1.5rem}}
</style>
</head>
<body>
<div class="wrap">

<div class="top-bar">
  <a href="index.html">&larr; AI Pet Lab</a>
  <span class="lesson-badge">Lesson 9 of 9 &mdash; Final</span>
</div>

<div class="header">
  <h1>Evolution Quiz &#129440;</h1>
  <p>The final test! Prove you understand learning rates, architecture, and the science behind your AI pet.</p>
</div>

<div class="quiz-progress" id="qProgress"></div>
<div id="quizArea"></div>

<div class="results" id="results">
  <h2 id="resultsTitle"></h2>
  <div class="score" id="resultsScore"></div>
  <p id="resultsMsg"></p>

  <div class="certificate" id="cert" style="display:none">
    <div class="cert-badge">&#127942;</div>
    <div class="cert-title">AI Pet Lab Graduate</div>
    <div class="cert-name" id="certName"></div>
    <div class="cert-pet" id="certPet"></div>
    <div class="cert-xp">+400 XP Earned</div>
  </div>

  <button class="btn-complete" onclick="completeLesson()">Back to Course Overview</button>
</div>

<canvas class="confetti" id="confetti" style="display:none"></canvas>

<div class="foot">
  <a href="architecture-lab.html">&larr; Architecture Lab</a>
  <a href="index.html">Course Overview &rarr;</a>
</div>

</div>

<script>
const petName=localStorage.getItem('petlab_pet_name')||'Your pet';
const petType=localStorage.getItem('petlab_pet')||'dog';

const questions=[
  {q:"A learning rate of 0.9 would likely cause:",opts:["Smooth, fast convergence","Wild oscillations that never settle","Very slow but stable learning","The model to stop training"],answer:1,explain:"A learning rate of 0.9 is extremely high. Each update overshoots the optimal solution, causing the loss to bounce around wildly instead of converging."},
  {q:"If your pet's neural network has too many neurons for a simple task, what can happen?",opts:["It learns faster","It overfits — memorizes training data instead of generalizing","It crashes","Nothing, more is always better"],answer:1,explain:"Overfitting occurs when a model is too complex for the task. It memorizes specific examples rather than learning general patterns, performing poorly on new situations."},
  {q:"What is the 'loss function' in machine learning?",opts:["The amount of data lost during training","A measure of how wrong the model's predictions are","The speed at which the model learns","The cost of running the model"],answer:1,explain:"The loss function quantifies how far the model's predictions are from the correct answers. Training aims to minimize this value — lower loss means better performance."},
  {q:"Why might you choose a smaller network over a larger one?",opts:["Smaller networks are always better","Faster training, less overfitting, and sufficient for simple tasks","Smaller networks are cheaper to buy","You wouldn't — bigger is always better"],answer:1,explain:"Smaller networks train faster, use less compute, and are less likely to overfit on simple tasks. The key is matching network capacity to problem complexity."},
  {q:"Your pet learned 'sit' perfectly in training but fails with real-world distractions. This is called:",opts:["Catastrophic forgetting","Poor generalization / overfitting to training conditions","A broken reward function","Negative transfer"],answer:1,explain:"When a model performs well in training but poorly in new conditions, it hasn't generalized. This is a form of overfitting — it learned the specific training setup, not the underlying concept."},
  {q:"What does 'hyperparameter tuning' mean?",opts:["Tuning the model's weights","Adjusting settings like learning rate and architecture that aren't learned by the model itself","Making the model bigger","Running more training data"],answer:1,explain:"Hyperparameters (learning rate, number of neurons, batch size, etc.) are set by the designer, not learned by the model. Finding the right combination is crucial and is often done through experimentation."}
];

let current=0,score=0,answered=new Array(questions.length).fill(null);

function renderProgress(){
  const el=document.getElementById('qProgress');el.innerHTML='';
  questions.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='qp-dot'+(i===current?' active':'')+(answered[i]==='correct'?' correct':'')+(answered[i]==='wrong'?' wrong':'');
    el.appendChild(d);
  });
}

function renderQuestion(){
  if(current>=questions.length){showResults();return;}
  const q=questions[current];
  const area=document.getElementById('quizArea');
  let h=`<div class="question-card"><div class="q-num">Question ${current+1} of ${questions.length}</div><div class="q-text">${q.q}</div><div class="options">`;
  q.opts.forEach((o,i)=>{h+=`<div class="opt" data-idx="${i}" onclick="selectAnswer(${i})">${o}</div>`;});
  h+=`</div><div class="feedback" id="feedback"></div><button class="btn-next" id="btnNext" onclick="nextQuestion()">Next &rarr;</button></div>`;
  area.innerHTML=h;renderProgress();
}

function selectAnswer(idx){
  const q=questions[current];const opts=document.querySelectorAll('.opt');const fb=document.getElementById('feedback');
  opts.forEach(o=>o.classList.add('disabled'));
  if(idx===q.answer){opts[idx].classList.add('correct');score++;answered[current]='correct';fb.className='feedback show correct';fb.textContent='Correct! '+q.explain;}
  else{opts[idx].classList.add('wrong');opts[q.answer].classList.add('correct');answered[current]='wrong';fb.className='feedback show wrong';fb.textContent='Not quite. '+q.explain;}
  document.getElementById('btnNext').style.display='block';renderProgress();
}

function nextQuestion(){current++;renderQuestion();}

function showResults(){
  document.getElementById('quizArea').style.display='none';
  const r=document.getElementById('results');r.style.display='block';
  const pct=Math.round((score/questions.length)*100);
  const sc=document.getElementById('resultsScore');sc.textContent=score+'/'+questions.length;
  sc.className='score '+(pct>=80?'good':pct>=60?'ok':'bad');
  document.getElementById('resultsTitle').textContent=pct>=80?'You graduated!':pct>=60?'Almost there!':'Keep studying!';
  document.getElementById('resultsMsg').textContent=pct>=80?'You\'ve mastered the fundamentals of reinforcement learning, neural architecture, and hyperparameter tuning!':pct>=60?'Solid work! Review the Evolution Chamber lessons to fill in any gaps.':'Don\'t give up! Go back through Module 3 and try the simulations again.';

  // Show certificate for passing scores
  if(pct>=60){
    const cert=document.getElementById('cert');
    cert.style.display='block';
    document.getElementById('certName').textContent='Trained with: '+petName;
    const petEmojis={cat:'Whiskers the Cat',dog:'Sparky the Dog',robot:'Bolt the Robot'};
    document.getElementById('certPet').textContent='AI Pet: '+(petEmojis[petType]||petName);

    if(pct>=80) launchConfetti();
  }
}

function launchConfetti(){
  const canvas=document.getElementById('confetti');
  canvas.style.display='block';
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  const ctx=canvas.getContext('2d');

  const particles=[];
  const colors=['#FF6B35','#38bdf8','#4ade80','#c084fc','#f87171','#fbbf24'];

  for(let i=0;i<120;i++){
    particles.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height-canvas.height,
      w:Math.random()*8+4,
      h:Math.random()*6+2,
      color:colors[Math.floor(Math.random()*colors.length)],
      speed:Math.random()*3+2,
      spin:Math.random()*0.2-0.1,
      angle:Math.random()*Math.PI*2,
      drift:Math.random()*2-1
    });
  }

  let frame=0;
  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    frame++;
    let alive=false;

    particles.forEach(p=>{
      p.y+=p.speed;
      p.x+=p.drift;
      p.angle+=p.spin;
      if(p.y<canvas.height+20)alive=true;

      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.angle);
      ctx.fillStyle=p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });

    if(alive&&frame<300)requestAnimationFrame(animate);
    else{canvas.style.display='none';}
  }
  animate();
}

function completeLesson(){
  localStorage.setItem('petlab_lesson_9','complete');
  window.location.href='index.html';
}

renderQuestion();
</script>
</body>
</html>
